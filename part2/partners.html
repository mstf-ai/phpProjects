<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشركاء</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            position: relative;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(180deg, #F5E6CA 0%, #D2B48C 100%);
        }
        .image-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        .pyramids-day, .pyramids-night {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }
        .active {
            opacity: 1;
        }
        .sun {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 70px;
            height: 70px;
            background: #FF8C00;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(255, 140, 0, 0.7);
            animation: moveSun 8s infinite alternate;
            display: none;
            z-index: 2;
        }
        .moon {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 70px;
            height: 70px;
            background: #F0F8FF;
            border-radius: 50%;
            box-shadow: 0 0 25px rgba(240, 248, 255, 0.7);
            animation: moveMoon 8s infinite alternate;
            display: none;
            z-index: 2;
        }
        @keyframes moveSun {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }
        @keyframes moveMoon {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }
        .partners-section {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            animation: fadeIn 1.5s ease-in;
            z-index: 3;
            max-width: 1200px;
            width: 90%;
            margin: 2rem auto;
        }
        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(40px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .signup-icon {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            padding: 15px;
            transition: background 0.3s ease, transform 0.3s ease;
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 4;
        }
        .signup-icon:hover {
            background: rgba(255, 255, 255, 0.6);
            transform: scale(1.15);
        }
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
            z-index: 2;
        }
        .night .stars {
            display: block;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle 1.8s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        .sand {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 80px;
            background: linear-gradient(to right, #EDC9AF, #DAA520);
            animation: sandFlow 12s infinite linear;
            z-index: 2;
        }
        .night .sand {
            background: linear-gradient(to right, #2F4F4F, #4682B4);
        }
        @keyframes sandFlow {
            0% { background-position: 0 0; }
            100% { background-position: 150px 0; }
        }
        .partner-card {
            background: rgba(255, 255, 255, 0.25);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .partner-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .partner-card img {
            width: 100%;
            height: 150px;
            object-fit: contain;
            background: #fff;
            padding: 1rem;
        }
    </style>
</head>
<body class="min-h-screen relative">
    <div class="image-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/57/Egypt.Giza.Sphinx.01.jpg" alt="الأهرامات نهارًا" class="pyramids-day active">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/71/Great_Sphinx_of_Giza_and_the_Pyramid_of_Khafre_at_night.jpg" alt="الأهرامات ليلًا" class="pyramids-night">
    </div>
    <div class="sun active"></div>
    <div class="moon"></div>
    <div class="stars">
        <div class="star" style="width: 2px; height: 2px; top: 10%; left: 20%;"></div>
        <div class="star" style="width: 3px; height: 3px; top: 15%; left: 50%; animation-delay: 0.5s;"></div>
        <div class="star" style="width: 2px; height: 2px; top: 30%; left: 70%; animation-delay: 1s;"></div>
        <div class="star" style="width: 4px; height: 4px; top: 50%; left: 30%; animation-delay: 1.5s;"></div>
        <div class="star" style="width: 2px; height: 2px; top: 70%; left: 80%; animation-delay: 0.8s;"></div>
    </div>
    <div class="sand"></div>
    <div class="partners-section text-center">
        <h1 class="text-4xl font-bold text-white mb-8 drop-shadow-lg">شركاؤنا</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="partner-card">
                <img src="https://via.placeholder.com/150x150?text=شعار+الشريك+1" alt="شعار الشريك 1">
                <div class="p-4">
                    <h2 class="text-xl font-semibold text-white mb-2">مؤسسة التراث المصري</h2>
                    <p class="text-gray-300">شريك في الحفاظ على التراث الثقافي ودعم المبادرات الأثرية...</p>
                </div>
            </div>
            <div class="partner-card">
                <img src="https://via.placeholder.com/150x150?text=شعار+الشريك+2" alt="شعار الشريك 2">
                <div class="p-4">
                    <h2 class="text-xl font-semibold text-white mb-2">شركة السياحة الدولية</h2>
                    <p class="text-gray-300">تعاون في تعزيز السياحة المستدامة في منطقة الأهرامات...</p>
                </div>
            </div>
            <div class="partner-card">
                <img src="https://via.placeholder.com/150x150?text=شعار+الشريك+3" alt="شعار الشريك 3">
                <div class="p-4">
                    <h2 class="text-xl font-semibold text-white mb-2">منظمة البيئة المصرية</h2>
                    <p class="text-gray-300">دعم المبادرات البيئية لحماية المناطق الأثرية...</p>
                </div>
            </div>
        </div>
    </div>
    <a href="#" class="signup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
        </svg>
    </a>
    <script>
        const body = document.body;
        const sun = document.querySelector('.sun');
        const moon = document.querySelector('.moon');
        const pyramidsDay = document.querySelector('.pyramids-day');
        const pyramidsNight = document.querySelector('.pyramids-night');
        let isDay = true;

        function toggleDayNight() {
            if (isDay) {
                body.classList.add('night');
                sun.classList.remove('active');
                moon.classList.add('active');
                pyramidsDay.classList.remove('active');
                pyramidsNight.classList.add('active');
            } else {
                body.classList.remove('night');
                sun.classList.add('active');
                moon.classList.remove('active');
                pyramidsNight.classList.remove('active');
                pyramidsDay.classList.add('active');
            }
            isDay = !isDay;
        }

        setInterval(toggleDayNight, 8000); // Toggle every 8 seconds
        toggleDayNight(); // Initial toggle to start animation
    </script>
</body>
</html>
